---
services:
  unifi-voucher-manager:
    # Locally built image — `docker compose build` produces this tag, and
    # `docker compose up` reuses it. If the image is missing, Compose builds
    # it automatically from the Dockerfile below.
    image: "unifi-voucher-manager:local"
    build:
      context: "./"
      target: "runtime"
      dockerfile: "./Dockerfile"

    # Upstream published images (uncomment one to pull instead of build):
    # image: "docker.io/etiennecollin/unifi-voucher-manager:latest"
    # image: "ghcr.io/etiennecollin/unifi-voucher-manager:latest"

    container_name: "unifi-voucher-manager"
    restart: "unless-stopped"
    ports:
      - "3000:3000"

    # Configuration lives in .env (gitignored). Copy .env.example → .env and
    # fill in the real values. See .env.example for documentation of each key.
    env_file:
      - .env
